<body class="text-zinc-200 antialiased font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

        activity: (

        ),
        wrench: (

        ),
        shoppingbag: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

        ),
        x: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        ),
        star: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
        ),
        packageopen: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
        ),
        layers: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2" />
            <polyline points="2 17 12 22 22 17" />
            <polyline points="2 12 12 17 22 12" />
          </svg>
        ),
        edit: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

      return icons[name] || (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="12" cy="12" r="10" />
        </svg>
      );
    }

    /* --- CADASTRO OFICIAL DE PRODUTOS DE COBRE --- */
    const WIRE_PRODUCTS = [
      { code: "4244", label: "FIO AWG13 VERDE" },
      { code: "4245", label: "FIO AWG 13 NATURAL" },
      { code: "5200", label: "FIO AWG15 NATURAL" },
      { code: "5201", label: "FIO AWG16 NATURAL" },
      { code: "5203", label: "FIO AWG19 NATURAL" },
      { code: "5205", label: "FIO AWG22 NATURAL" },
      { code: "5215", label: "FIO AWG11 NATURAL" },
      { code: "5219", label: "FIO . AWG17 NATURAL" },
      { code: "5234", label: "FIO AWG20 NATURAL" },
      { code: "5239", label: "FIO AWG20 VERDE" },
      { code: "5240", label: "FIO AWG22 VERDE" },
      { code: "5246", label: "FIO AWG17 VERDE" },
      { code: "5247", label: "FIO AWG15 VERDE" },
      { code: "5249", label: "FIO AWG16 VERDE" },
      { code: "5250", label: "FIO AWG22 VERMELHO" },
      { code: "21658", label: "FIO SUJO" }
    ];

    const TARA_CAPOTAS = [
      { size: "SEM CAPOTA", value: "0,000" },
      { size: "PP", value: "0,090" },
      { size: "P", value: "0,130" },
      { size: "M", value: "0,225" },
      { size: "G", value: "0,330" },
      { size: "GG", value: "0,560" }
    ];

    const ORIGEM_DESCARTE = [
      { code: "1", label: "PROCESSOS DA LINHA" },
      { code: "2", label: "FALHA OPERACIONAL" },
      { code: "3", label: "DEFEITO DE FORNECEDOR" }
    ];

    /* --- CREDENCIAIS AUTORIZADAS (4 PESSOAS TOTAL) --- */
    const VALID_USERS = [
      { login: "Vinicius", password: "Rocal123" },
      { login: "Pedro", password: "PHrocal123" },
      { login: "Vilma", password: "Vilma2019" },
      { login: "Alimentadores", password: "Rocal@123" }
    ];

    const getBitola = (label) => {
      if (label.includes("SUJO")) return "SUJO";
      const match = label.match(/AWG\s*\d+/i);
      return match ? match[0].toUpperCase() : "AWG";
    };

    function App() {
      const [loggedUser, setLoggedUser] = useState(null);
      const [loginInput, setLoginInput] = useState("");
      const [passwordInput, setPasswordInput] = useState("");
      const [loginError, setLoginError] = useState("");
      const [onlineCount, setOnlineCount] = useState(1);

      const [currentDateTime, setCurrentDateTime] = useState(new Date());
      const [activeSystemTab, setActiveSystemTab] = useState('lancamento');
      const [activeGestaoSubtab, setActiveGestaoSubtab] = useState('ferias');

      const productionLines = {
        TOROIDE: Array.from({ length: 6 }, (_, i) => `TOROIDE ${i + 1}`),
        INDUTOR: Array.from({ length: 6 }, (_, i) => `INDUTOR ${i + 1}`),
        CONECTORES: Array.from({ length: 4 }, (_, i) => `CONECTORES ${i + 1}`),
        CHICOTES: ["CHICOTES 1"]
      };

      const createEmptyProductionState = () => {
        const state = {};
        Object.keys(productionLines).forEach(category => {
          productionLines[category].forEach(line => {
            state[line] = [{ codigo: '', quantidade: '' }];
          });
        });
        return state;
      };

      const [activeProduction, setActiveProduction] = useState(createEmptyProductionState());
      const [savedHistory, setSavedHistory] = useState([]);
      const [selectedRecordId, setSelectedRecordId] = useState(null);
      const [activeCategoryTab, setActiveCategoryTab] = useState('TOROIDE');
      const [toast, setToast] = useState(null);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      const [adminNotesList, setAdminNotesList] = useState([]);
      const [currentNoteId, setCurrentNoteId] = useState(null);
      const [noteTitle, setNoteTitle] = useState("");
      const [noteContent, setNoteContent] = useState("");

      const [vacations, setVacations] = useState([]);
      const [newVacation, setNewVacation] = useState({
        nome: '',
        cargo: '',
        dataInicio: '',
        dataFim: '',
        empresa: 'ROCAL'
      });

      const [shiftNotes, setShiftNotes] = useState("");
      const [wireHistory, setWireHistory] = useState([]);
      const [newWireInput, setNewWireInput] = useState({
        fioIndex: '0',
        quantidade: '',
        unidade: 'Kg',
        taraIndex: '0',
        origemIndex: '0',
        destino: 'TOROIDE 1',
        alimentador: ''
      });

      const [serviceOrders, setServiceOrders] = useState([]);
      const [newOS, setNewOS] = useState({
        dataEnvio: new Date().toISOString().split('T')[0],
        descricao: '',
        alimentador: '',
        status: 'STANDBY'
      });

      const [suggestions, setSuggestions] = useState([]);
      const [newSuggestionText, setNewSuggestionText] = useState("");

      const [almoxarifadoRequests, setAlmoxarifadoRequests] = useState([]);
      const [savedMaterials, setSavedMaterials] = useState([]);
      const [newAlmoxarifado, setNewAlmoxarifado] = useState({
        itemName: '',
        itemCode: '',
        urgencia: 'PODE ESPERAR'
      });

      const [quickRequestModal, setQuickRequestModal] = useState({
        isOpen: false,
        item: null,
        quantidade: '',
        alimentador: '',
        urgencia: 'PODE ESPERAR'
      });

      const [confirmModal, setConfirmModal] = useState({
        isOpen: false,
        title: '',
        message: '',
        onConfirm: null
      });

      const [saveModal, setSaveModal] = useState({
        isOpen: false,
        alimentadorName: ''
      });

      const reportRef = useRef(null);
      const scrapTotalsReportRef = useRef(null);
      const scrapHistoryReportRef = useRef(null);
      const almoxarifadoReportRef = useRef(null);

      useEffect(() => {
        const timer = setInterval(() => {
          setCurrentDateTime(new Date());
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        const savedSession = sessionStorage.getItem('rocal_active_session');
        if (savedSession) {
          setLoggedUser(savedSession);
          updateActiveSessions(savedSession);
        }

        const sessionInterval = setInterval(() => {
          const current = sessionStorage.getItem('rocal_active_session');
          if (current) {
            updateActiveSessions(current);
          }
          syncOnlineCount();
        }, 3000);

        return () => clearInterval(sessionInterval);
      }, []);

      const updateActiveSessions = (username) => {
        const now = Date.now();
        let active = JSON.parse(localStorage.getItem('rocal_active_users_v1') || '{}');
        active[username] = now;
        
        const limit = now - 12000;
        const cleaned = {};
        Object.keys(active).forEach(user => {
          if (active[user] > limit) {
            cleaned[user] = active[user];
          }
        });
        localStorage.setItem('rocal_active_users_v1', JSON.stringify(cleaned));
      };

      const syncOnlineCount = () => {
        const active = JSON.parse(localStorage.getItem('rocal_active_users_v1') || '{}');
        const now = Date.now();
        const limit = now - 12000;
        const onlineUsers = Object.keys(active).filter(user => active[user] > limit);
        setOnlineCount(onlineUsers.length || 1);
      };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        const userFound = VALID_USERS.find(
          u => u.login.toLowerCase() === loginInput.trim().toLowerCase() && u.password === passwordInput
        );

        if (userFound) {
          sessionStorage.setItem('rocal_active_session', userFound.login);
          setLoggedUser(userFound.login);
          updateActiveSessions(userFound.login);
          syncOnlineCount();
          setLoginInput("");
          setPasswordInput("");
          setLoginError("");
          showToast(`Bem-vindo, ${userFound.login}!`);
        } else {
          setLoginError("Login ou senha incorretos.");
        }
      };

      const handleLogout = () => {
        if (loggedUser) {
          let active = JSON.parse(localStorage.getItem('rocal_active_users_v1') || '{}');
          delete active[loggedUser];
          localStorage.setItem('rocal_active_users_v1', JSON.stringify(active));
        }
        sessionStorage.removeItem('rocal_active_session');
        setLoggedUser(null);
        syncOnlineCount();
        showToast("Sessão finalizada.", "info");
      };

      useEffect(() => {
        const notes = localStorage.getItem('rocal_shift_notes');
        if (notes) setShiftNotes(notes);

        const savedNotesList = localStorage.getItem('rocal_admin_notes_list_v2');
        if (savedNotesList) {
          try {
            setAdminNotesList(JSON.parse(savedNotesList));
          } catch(e) { console.error(e); }
        }

        const savedVacations = localStorage.getItem('rocal_vacations_v1');
        if (savedVacations) {
          try { setVacations(JSON.parse(savedVacations)); } catch (e) { console.error(e); }
        }

        const savedMats = localStorage.getItem('rocal_saved_materials_v1');
        if (savedMats) {
          try { setSavedMaterials(JSON.parse(savedMats)); } catch (e) { console.error(e); }
        }

        const localData = localStorage.getItem('producao_salva_historico_v3');
        if (localData) {
          try {
            const parsed = JSON.parse(localData);
            const sanitized = parsed.map(record => ({
              ...record,
              status: record.status || 'NAO_TRANSFERIDO',
              alimentador: record.alimentador || record.operador || 'NÃO IDENTIFICADO'
            }));
            setSavedHistory(sanitized);
            if (sanitized.length > 0) {
              setSelectedRecordId(sanitized[0].id);
            }
          } catch (e) { console.error(e); }
        }

        const localWires = localStorage.getItem('producao_descartes_historico_v3');
        if (localWires) {
          try { setWireHistory(JSON.parse(localWires)); } catch (e) { console.error(e); }
        }

        const localOS = localStorage.getItem('producao_os_historico_v3');
        if (localOS) {
          try { setServiceOrders(JSON.parse(localOS)); } catch (e) { console.error(e); }
        }

        const localAlmoxarifado = localStorage.getItem('producao_almoxarifado_v3');
        if (localAlmoxarifado) {
          try { setAlmoxarifadoRequests(JSON.parse(localAlmoxarifado)); } catch (e) { console.error(e); }
        }

        const localSug = localStorage.getItem('producao_sugestoes_v1');
        if (localSug) {
          try { setSuggestions(JSON.parse(localSug)); } catch (e) { console.error(e); }
        }
      }, []);

      const saveToLocalStorage = (newHistory) => {
        localStorage.setItem('producao_salva_historico_v3', JSON.stringify(newHistory));
        setSavedHistory(newHistory);
      };

      const saveWiresToLocalStorage = (newWires) => {
        localStorage.setItem('producao_descartes_historico_v3', JSON.stringify(newWires));
        setWireHistory(newWires);
      };

      const saveOSToLocalStorage = (newOSList) => {
        localStorage.setItem('producao_os_historico_v3', JSON.stringify(newOSList));
        setServiceOrders(newOSList);
      };

      const saveAlmoxarifadoToLocalStorage = (newRequestList) => {
        localStorage.setItem('producao_almoxarifado_v3', JSON.stringify(newRequestList));
        setAlmoxarifadoRequests(newRequestList);
      };

      const saveSuggestionsToLocalStorage = (newSugList) => {
        localStorage.setItem('producao_sugestoes_v1', JSON.stringify(newSugList));
        setSuggestions(newSugList);
      };

      const addSuggestion = () => {
        if (!newSuggestionText.trim()) {
          showToast("Por favor, digite o conteúdo da sugestão!", "error");
          return;
        }
        const item = {
          id: 'sug_' + Date.now(),
          text: newSuggestionText.trim(),
          timestamp: new Date().toISOString(),
          formattedDate: new Date().toLocaleDateString('pt-BR'),
          formattedTime: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
        };
        const updated = [item, ...suggestions];
        saveSuggestionsToLocalStorage(updated);
        setNewSuggestionText("");
        showToast("Sugestão de melhoria registrada com sucesso!");
      };

      const removeSuggestion = (id) => {
        setConfirmModal({
          isOpen: true,
          title: 'Excluir Sugestão',
          message: 'Deseja remover esta sugestão de melhoria permanentemente?',
          onConfirm: () => {
            const updated = suggestions.filter(s => s.id !== id);
            saveSuggestionsToLocalStorage(updated);
            showToast("Sugestão excluída.");
            setConfirmModal(prev => ({ ...prev, isOpen: false }));
          }
        });
      };

      const handleSaveAdminNote = () => {
        if (!noteTitle.trim()) {
          showToast("Por favor, insira um título para a nota!", "error");
          return;
        }

        let updatedList;
        if (currentNoteId) {
          updatedList = adminNotesList.map(note => {
            if (note.id === currentNoteId) {
              return { 
                ...note, 
                title: noteTitle.trim(), 
                content: noteContent, 
                timestamp: new Date().toISOString() 
              };
            }
            return note;
          });
          showToast("Nota de gestão atualizada com sucesso!");
        } else {
          const newNote = {
            id: 'note_' + Date.now(),
            title: noteTitle.trim(),
            content: noteContent,
            timestamp: new Date().toISOString()
          };
          updatedList = [newNote, ...adminNotesList];
          showToast("Nova nota de gestão salva!");
        }

        setAdminNotesList(updatedList);
        localStorage.setItem('rocal_admin_notes_list_v2', JSON.stringify(updatedList));
        
        setNoteTitle("");
        setNoteContent("");
        setCurrentNoteId(null);
      };

      const loadNote = (note) => {
        setNoteTitle(note.title);
        setNoteContent(note.content);
        setCurrentNoteId(note.id);
        showToast(`Nota "${note.title}" carregada!`, "info");
      };

      const startNewNote = () => {
        setNoteTitle("");
        setNoteContent("");
        setCurrentNoteId(null);
        showToast("Formulário limpo para nova nota.", "info");
      };

      const handleDeleteAdminNote = (id, e) => {
        e.stopPropagation();
        setConfirmModal({
          isOpen: true,
          title: 'Excluir Nota',
          message: 'Deseja realmente remover esta nota de gestão permanentemente?',
          onConfirm: () => {
            const updated = adminNotesList.filter(note => note.id !== id);
            setAdminNotesList(updated);
            localStorage.setItem('rocal_admin_notes_list_v2', JSON.stringify(updated));
            if (currentNoteId === id) {
              setNoteTitle("");
              setNoteContent("");
              setCurrentNoteId(null);
            }
            showToast("Nota excluída.");
            setConfirmModal(prev => ({ ...prev, isOpen: false }));
          }
        });
      };

      const addVacationRecord = (e) => {
        e.preventDefault();
        if (!newVacation.nome.trim() || !newVacation.cargo.trim() || !newVacation.dataInicio || !newVacation.dataFim) {
          showToast("Por favor, preencha todos os campos do colaborador!", "error");
          return;
        }

        const record = {
          id: 'vac_' + Date.now(),
          nome: newVacation.nome.toUpperCase().trim(),
          cargo: newVacation.cargo.toUpperCase().trim(),
          dataInicio: newVacation.dataInicio,

                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '10px', textAlign: 'left' }}>
                  <thead>
                    <tr style={{ backgroundColor: '#f4f4f5', borderBottom: '2px solid #e4e4e7' }}>
                      <th style={{ padding: '8px', fontWeight: 'bold' }}>Data/Hora</th>
                      <th style={{ padding: '8px', fontWeight: 'bold' }}>Fio</th>
                      <th style={{ padding: '8px', fontWeight: 'bold' }}>Linha</th>
                      <th style={{ padding: '8px', fontWeight: 'bold' }}>Alimentador</th>
                      <th style={{ padding: '8px', fontWeight: 'bold' }}>Origem</th>
                      <th style={{ padding: '8px', fontWeight: 'bold', textAlign: 'right' }}>Qtd</th>
                    </tr>
                  </thead>
                  <tbody>
                    {wireHistory.map(wire => (
                      <tr style={{ borderBottom: '1px solid #e4e4e7' }} key={wire.id}>
                        <td style={{ padding: '8px' }}>{wire.formattedDate} {wire.formattedTime}</td>
                        <td style={{ padding: '8px', fontWeight: 'bold' }}>{wire.fioLabel} ({wire.fioCode})</td>
                        <td style={{ padding: '8px' }}>{wire.destino}</td>
                        <td style={{ padding: '8px' }}>{wire.alimentador}</td>
                        <td style={{ padding: '8px' }}>{wire.origemLabel}</td>
                        <td style={{ padding: '8px', fontWeight: 'bold', textAlign: 'right' }}>{wire.quantidade} {wire.unidade}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div ref={almoxarifadoReportRef} style={{ padding: '30px', color: '#18181b', fontFamily: 'sans-serif' }}>
              <div style={{ border: '2px solid #e4e4e7', padding: '30px', borderRadius: '14px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '2px solid #27272a', paddingBottom: '15px', marginBottom: '25px' }}>
                  <div>
                    <h1 style={{ fontSize: '24px', fontWeight: '900', margin: 0 }}>ROCAL ELETRÔNICA</h1>
                    <p style={{ fontSize: '10px', color: '#71717a', margin: '4px 0 0', textTransform: 'uppercase', letterSpacing: '1px' }}>Pedido de Materiais ao Almoxarifado</p>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <p style={{ fontSize: '10px', color: '#71717a', margin: 0 }}>Emitido em: {new Date().toLocaleDateString('pt-BR')} às {new Date().toLocaleTimeString('pt-BR')}</p>
                  </div>
                </div>

                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '11px', textAlign: 'left' }}>
                  <thead>
                    <tr style={{ backgroundColor: '#f4f4f5', borderBottom: '2px solid #e4e4e7' }}>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Data</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Item Solicitado</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Código</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Qtd</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Alimentador</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {almoxarifadoRequests.map((item) => (
                      <tr style={{ borderBottom: '1px solid #e4e4e7' }} key={item.id}>
                        <td style={{ padding: '10px' }}>{item.formattedDate}</td>
                        <td style={{ padding: '10px', fontWeight: 'bold' }}>{item.itemName}</td>
                        <td style={{ padding: '10px' }}>{item.itemCode}</td>
                        <td style={{ padding: '10px', fontWeight: 'bold' }}>{item.quantidade} UN</td>
                        <td style={{ padding: '10px' }}>{item.alimentador}</td>
                        <td style={{ padding: '10px', fontWeight: 'bold' }}>{item.status}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
