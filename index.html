<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCAL - Controle de Produção e Suprimentos</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 & ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel compiler for in-browser JSX parsing -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- html2pdf.js for report downloads -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* Estilização de rolagem moderna e uniforme */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    body {
      background-color: #09090b;
    }

    @keyframes spin-clockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-counterclockwise {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    .animate-spin-fast {
      animation: spin-clockwise 4s linear infinite;
    }
    .animate-spin-reverse-medium {
      animation: spin-counterclockwise 7s linear infinite;
    }
  </style>
</head>
<body class="text-zinc-200 antialiased font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    function Icon({ name, className = "w-4 h-4" }) {
      const icons = {
        user: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />

        ),
        lock: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

            <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
            <line x1="9" y1="10" x2="15" y2="10" />
            <line x1="9" y1="14" x2="15" y2="14" />
            <line x1="9" y1="18" x2="13" y2="18" />
          </svg>
        ),
        chevronright: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="9 18 15 12 9 6" />

        ),
        filedown: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />

        ),
        filetext: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
        ),
        activity: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
        ),
        wrench: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
          </svg>
        ),
        x: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        ),
        star: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
        ),
        packageopen: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
        ),
        layers: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2" />
            <polyline points="2 17 12 22 22 17" />
            <polyline points="2 12 12 17 22 12" />
          </svg>
        ),
        edit: (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
          </svg>
        )
      };
      return icons[name] || (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="12" cy="12" r="10" />
        </svg>
      );
    }

    const WIRE_PRODUCTS = [
      { code: "4244", label: "FIO AWG13 VERDE" },
      { code: "4245", label: "FIO AWG 13 NATURAL" },
      { code: "5200", label: "FIO AWG15 NATURAL" },
      { code: "5201", label: "FIO AWG16 NATURAL" },
      { code: "5203", label: "FIO AWG19 NATURAL" },
      { code: "5205", label: "FIO AWG22 NATURAL" },
      { code: "5215", label: "FIO AWG11 NATURAL" },
      { code: "5219", label: "FIO . AWG17 NATURAL" },
      { code: "5234", label: "FIO AWG20 NATURAL" },
      { code: "5239", label: "FIO AWG20 VERDE" },
      { code: "5240", label: "FIO AWG22 VERDE" },
      { code: "5246", label: "FIO AWG17 VERDE" },
      { code: "5247", label: "FIO AWG15 VERDE" },
      { code: "5249", label: "FIO AWG16 VERDE" },
      { code: "5250", label: "FIO AWG22 VERMELHO" },
      { code: "21658", label: "FIO SUJO" }
    ];

    const TARA_CAPOTAS = [
      { size: "SEM CAPOTA", value: "0,000" },
      { size: "PP", value: "0,090" },
      { size: "P", value: "0,130" },
      { size: "M", value: "0,225" },
      { size: "G", value: "0,330" },
      { size: "GG", value: "0,560" }
    ];

    const ORIGEM_DESCARTE = [
      { code: "1", label: "PROCESSOS DA LINHA" },
      { code: "2", label: "FALHA OPERACIONAL" },
      { code: "3", label: "DEFEITO DE FORNECEDOR" }
    ];

    const DEFAULT_USERS = [
      { login: "Vinicius", password: "Rocal123" },
      { login: "Pedro", password: "PHrocal123" },
      { login: "Vilma", password: "Vilma2019" },
      { login: "Alimentadores", password: "Rocal@123" }
    ];

    const getBitola = (label) => {
      if (label.includes("SUJO")) return "SUJO";
      const match = label.match(/AWG\s*\d+/i);
      return match ? match[0].toUpperCase() : "AWG";
    };

    function App() {
      const [credentials, setCredentials] = useState(() => {
        const saved = localStorage.getItem('rocal_custom_credentials_v1');
        if (saved) {
          try { return JSON.parse(saved); } catch(e) { console.error(e); }
        }
        return DEFAULT_USERS;
      });

      const [loggedUser, setLoggedUser] = useState(null);
      const [loginInput, setLoginInput] = useState("");
      const [passwordInput, setPasswordInput] = useState("");
      const [loginError, setLoginError] = useState("");
      const [onlineCount, setOnlineCount] = useState(1);

      const [currentDateTime, setCurrentDateTime] = useState(new Date());
      const [activeSystemTab, setActiveSystemTab] = useState('lancamento');
      const [activeGestaoSubtab, setActiveGestaoSubtab] = useState('ferias');

      const [isChangePasswordOpen, setIsChangePasswordOpen] = useState(false);
      const [isCalendarModalOpen, setIsCalendarModalOpen] = useState(false);
      const [pwdForm, setPwdForm] = useState({
        current: '',
        newPwd: '',
        confirm: ''
      });
      const [showPwd, setShowPwd] = useState({
        current: false,
        newPwd: false,
        confirm: false
      });

      const productionLines = {
        TOROIDE: Array.from({ length: 6 }, (_, i) => `TOROIDE ${i + 1}`),
        INDUTOR: Array.from({ length: 6 }, (_, i) => `INDUTOR ${i + 1}`),
        CONECTORES: Array.from({ length: 4 }, (_, i) => `CONECTORES ${i + 1}`),
        CHICOTES: ["CHICOTES 1"],
        CABOS: ["CABOS 1", "CABOS 2"]
      };

      const createEmptyProductionState = () => {
        const state = {};
        Object.keys(productionLines).forEach(category => {
          productionLines[category].forEach(line => {
            state[line] = [{ codigo: '', quantidade: '' }];
          });
        });
        return state;
      };

      const [activeProduction, setActiveProduction] = useState(createEmptyProductionState());
      const [savedHistory, setSavedHistory] = useState([]);
      const [selectedRecordId, setSelectedRecordId] = useState(null);
      const [activeCategoryTab, setActiveCategoryTab] = useState('TOROIDE');
      const [toast, setToast] = useState(null);

      /* --- EDIT MODALS --- */
      const [isEditingRecord, setIsEditingRecord] = useState(false);
      const [editingRecordData, setEditingRecordData] = useState(null);

      // Modal para edição de Descarte de Fio
      const [isEditingWireModalOpen, setIsEditingWireModalOpen] = useState(false);
      const [wireBeingEdited, setWireBeingEdited] = useState(null);

      // Modal para edição de Férias
      const [isEditingVacationModalOpen, setIsEditingVacationModalOpen] = useState(false);
      const [vacationBeingEdited, setVacationBeingEdited] = useState(null);

      /* --- ESTADOS DO BLOCO DE NOTAS (SEPARADOS POR USUÁRIO PEDRO / VILMA) --- */
      const [pedroNotesList, setPedroNotesList] = useState([]);
      const [vilmaNotesList, setVilmaNotesList] = useState([]);
      const [noteTitle, setNoteTitle] = useState("");
      const [noteContent, setNoteContent] = useState("");
      const [currentNoteId, setCurrentNoteId] = useState(null);

      /* --- ESTADOS DO ESTOQUE GERAL (ANUAL) --- */
      const [annualScrapTotals, setAnnualScrapTotals] = useState(() => {
        const saved = localStorage.getItem('rocal_annual_scrap_totals_v1');
        if (saved) {
          try { return JSON.parse(saved); } catch(e) { console.error(e); }
        }
        const initial = {};
        WIRE_PRODUCTS.forEach(wire => {
          initial[wire.code] = 0;
        });
        return initial;
      });

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      const [vacations, setVacations] = useState([]);
      const [newVacation, setNewVacation] = useState({
        nome: '',
        cargo: '',
        dataInicio: '',
        dataFim: '',
        empresa: 'ROCAL',
        status: 'ANALISE'
      });

      // Ordenação das férias: 'PROXIMAS' ou 'LONGE'
      const [vacationSortOrder, setVacationSortOrder] = useState('PROXIMAS');

      const [shiftNotes, setShiftNotes] = useState("");
      const [wireHistory, setWireHistory] = useState([]);
      const [newWireInput, setNewWireInput] = useState({
        fioIndex: '0',
        quantidade: '',
        unidade: 'Kg',
        taraIndex: '0',
        origemIndex: '0',
        destino: 'TOROIDE 1',
        alimentador: ''
      });

      const [serviceOrders, setServiceOrders] = useState([]);
      const [newOS, setNewOS] = useState({
        dataEnvio: new Date().toISOString().split('T')[0],
        descricao: '',
        alimentador: '',
        status: 'STANDBY'
      });

      const [suggestions, setSuggestions] = useState([]);
      const [newSuggestionText, setNewSuggestionText] = useState("");

      const [confirmModal, setConfirmModal] = useState({
        isOpen: false,
        title: '',
        message: '',
        onConfirm: null
      });

      const [saveModal, setSaveModal] = useState({
        isOpen: false,
        alimentadorName: ''
      });

      const reportRef = useRef(null);
      const scrapTotalsReportRef = useRef(null);
      const scrapHistoryReportRef = useRef(null);

      useEffect(() => {
        const timer = setInterval(() => {
          setCurrentDateTime(new Date());
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      // Carregar as notas separadas de Pedro e Vilma do LocalStorage
      useEffect(() => {
        const savedPedro = localStorage.getItem('rocal_notes_pedro_v2');
        if (savedPedro) setPedroNotesList(JSON.parse(savedPedro));

        const savedVilma = localStorage.getItem('rocal_notes_vilma_v2');
        if (savedVilma) setVilmaNotesList(JSON.parse(savedVilma));
      }, []);

      useEffect(() => {
        const savedSession = sessionStorage.getItem('rocal_active_session');
        if (savedSession) {
          setLoggedUser(savedSession);
          updateActiveSessions(savedSession);
        }

        const sessionInterval = setInterval(() => {
          const current = sessionStorage.getItem('rocal_active_session');
          if (current) {
            updateActiveSessions(current);
          }
          syncOnlineCount();
        }, 3000);

        return () => clearInterval(sessionInterval);
      }, []);

      const updateActiveSessions = (username) => {
        const now = Date.now();
        let active = JSON.parse(localStorage.getItem('rocal_active_users_v1') || '{}');
        active[username] = now;
        
        const limit = now - 12000;
        const cleaned = {};
        Object.keys(active).forEach(user => {
          if (active[user] > limit) {
            cleaned[user] = active[user];
          }
        });
        localStorage.setItem('rocal_active_users_v1', JSON.stringify(cleaned));
      };

      const syncOnlineCount = () => {
        const active = JSON.parse(localStorage.getItem('rocal_active_users_v1') || '{}');
        const now = Date.now();
        const limit = now - 12000;
        const onlineUsers = Object.keys(active).filter(user => active[user] > limit);
        setOnlineCount(onlineUsers.length || 1);
      };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        const userFound = credentials.find(
          u => u.login.toLowerCase() === loginInput.trim().toLowerCase() && u.password === passwordInput
        );

        if (userFound) {
          sessionStorage.setItem('rocal_active_session', userFound.login);
          setLoggedUser(userFound.login);
          updateActiveSessions(userFound.login);
          syncOnlineCount();
          setLoginInput("");
          setPasswordInput("");
          setLoginError("");
          showToast(`Bem-vindo, ${userFound.login}!`);
        } else {
          setLoginError("Login ou senha incorretos.");
        }
      };

      const handleLogout = () => {
        if (loggedUser) {
          let active = JSON.parse(localStorage.getItem('rocal_active_users_v1') || '{}');
          delete active[loggedUser];
          localStorage.setItem('rocal_active_users_v1', JSON.stringify(active));
        }
        sessionStorage.removeItem('rocal_active_session');
        setLoggedUser(null);
        syncOnlineCount();
        showToast("Sessão finalizada.", "info");
      };

      useEffect(() => {
        const notes = localStorage.getItem('rocal_shift_notes');
        if (notes) setShiftNotes(notes);

        const savedVacations = localStorage.getItem('rocal_vacations_v1');
        if (savedVacations) {
          try { 
            const parsed = JSON.parse(savedVacations);
            const sanitized = parsed.map(v => ({ ...v, status: v.status || 'ANALISE' }));
            setVacations(sanitized); 
          } catch (e) { console.error(e); }
        }

        const localData = localStorage.getItem('producao_salva_historico_v3');
        if (localData) {
          try {
            const parsed = JSON.parse(localData);
            const sanitized = parsed.map(record => ({
              ...record,
              status: record.status || 'NAO_TRANSFERIDO',
              alimentador: record.alimentador || record.operador || 'NÃO IDENTIFICADO'
            }));
            setSavedHistory(sanitized);
            if (sanitized.length > 0) {
              setSelectedRecordId(sanitized[0].id);
            }
          } catch (e) { console.error(e); }
        }

        const localWires = localStorage.getItem('producao_descartes_historico_v3');
        if (localWires) {
          try { setWireHistory(JSON.parse(localWires)); } catch (e) { console.error(e); }
        }

        const localOS = localStorage.getItem('producao_os_historico_v3');
        if (localOS) {
          try { setServiceOrders(JSON.parse(localOS)); } catch (e) { console.error(e); }
        }

        const localSug = localStorage.getItem('producao_sugestoes_v1');
        if (localSug) {
          try { setSuggestions(JSON.parse(localSug)); } catch (e) { console.error(e); }
        }
      }, []);

      const saveToLocalStorage = (newHistory) => {
        localStorage.setItem('producao_salva_historico_v3', JSON.stringify(newHistory));
        setSavedHistory(newHistory);
      };

      const saveWiresToLocalStorage = (newWires) => {
        localStorage.setItem('producao_descartes_historico_v3', JSON.stringify(newWires));
        setWireHistory(newWires);
      };

      const saveOSToLocalStorage = (newOSList) => {
        localStorage.setItem('producao_os_historico_v3', JSON.stringify(newOSList));
        setServiceOrders(newOSList);
      };

      const saveSuggestionsToLocalStorage = (newSugList) => {
        localStorage.setItem('producao_sugestoes_v1', JSON.stringify(newSugList));
        setSuggestions(newSugList);
      };

      const addSuggestion = () => {
        if (!newSuggestionText.trim()) {
          showToast("Por favor, digite o conteúdo da sugestão!", "error");
          return;
        }
        const item = {
          id: 'sug_' + Date.now(),
          text: newSuggestionText.trim(),
          timestamp: new Date().toISOString(),
          formattedDate: new Date().toLocaleDateString('pt-BR'),
          formattedTime: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
        };
        const updated = [item, ...suggestions];
        saveSuggestionsToLocalStorage(updated);
        setNewSuggestionText("");
        showToast("Sugestão de melhoria registrada com sucesso!");
      };

      const removeSuggestion = (id) => {
        setConfirmModal({
          isOpen: true,
          title: 'Excluir Sugestão',
          message: 'Deseja remover esta sugestão de melhoria permanentemente?',
          onConfirm: () => {
            const updated = suggestions.filter(s => s.id !== id);
            saveSuggestionsToLocalStorage(updated);
            showToast("Sugestão excluída.");
            setConfirmModal(prev => ({ ...prev, isOpen: false }));
          }
        });
      };

      const handleSaveAdminNote = () => {
        if (!noteTitle.trim()) {
          showToast("Por favor, insira um título para a nota!", "error");
          return;
        }

        const activeManager = loggedUser ? loggedUser.toUpperCase() : "VISITANTE";
        if (activeManager !== "PEDRO" && activeManager !== "VILMA") {
          showToast("Apenas Pedro e Vilma podem salvar notas!", "error");
          return;
        }

        const isPedro = activeManager === "PEDRO";
        const targetList = isPedro ? pedroNotesList : vilmaNotesList;

        let updatedList;
        if (currentNoteId) {
          updatedList = targetList.map(note => {
            if (note.id === currentNoteId) {
              return { 
                ...note, 
                title: noteTitle.trim(), 
                content: noteContent, 
                timestamp: new Date().toISOString() 
              };
            }
            return note;
          });
          showToast(`Nota de gestão de ${activeManager} atualizada!`);
        } else {
          const newNote = {
            id: 'note_' + Date.now(),
            title: noteTitle.trim(),
            content: noteContent,
            timestamp: new Date().toISOString()
          };
          updatedList = [newNote, ...targetList];
          showToast(`Nova nota para ${activeManager} registrada!`);
        }

        if (isPedro) {
          setPedroNotesList(updatedList);
          localStorage.setItem('rocal_notes_pedro_v2', JSON.stringify(updatedList));
        } else {
          setVilmaNotesList(updatedList);
          localStorage.setItem('rocal_notes_vilma_v2', JSON.stringify(updatedList));
        }
        
        setNoteTitle("");
        setNoteContent("");
        setCurrentNoteId(null);
      };

      const loadNote = (note) => {
        setNoteTitle(note.title);
