<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCAL ELETRÔNICA - Controle de Produção</title>
  
  <!-- Tailwind CSS CDN para estilização visual rápida e responsiva -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 & ReactDOM 18 CDN para gerenciamento reativo de estado -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel standalone para renderizar JSX diretamente no arquivo HTML estático -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Biblioteca HTML2PDF para exportação de relatórios corporativos diretos em PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* Customização fina de barras de rolagem e resets visuais */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- ICON MAP COMPONENT (Substituindo dependência de Lucide-React para funcionamento estável e offline) ---
    const Icon = ({ name, className = "w-5 h-5" }) => {
      const paths = {
        plus: <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />,
        trash: <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />,
        save: <path strokeLinecap="round" strokeLinejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" />,
        filedown: <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />,
        calendar: <path strokeLinecap="round" strokeLinejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />,
        clock: <path strokeLinecap="round" strokeLinejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />,
        database: <path strokeLinecap="round" strokeLinejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0v3.75" />,
        checkcircle: <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />,
        alertcircle: <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />,
        trendingup: <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 18L9 11.25l4.5 4.5L21.75 7.5M21.75 7.5H16.5M21.75 7.5v5.25" />,
        filetext: <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />,
        refresh: <path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />,
        x: <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />,
        layers: <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 12l8.954-4.477a2.25 2.25 0 012.243 0L22.25 12l-8.954 4.477a2.25 2.25 0 01-2.243 0L2.25 12z M2.25 5.75l8.954-4.477a2.25 2.25 0 012.243 0L22.25 5.75 M2.25 18.25l8.954-4.477a2.25 2.25 0 012.243 0L22.25 18.25" />,
        chevronright: <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />,
        user: <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />,
        activity: <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />,
        clipboardlist: <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />,
        wrench: <path strokeLinecap="round" strokeLinejoin="round" d="M11.42 15.015A3 3 0 0019.122 7.321m-7.702 7.694l-3.321 3.321m3.321-3.321a3 3 0 01-2.222-2.222m1.111-1.111a3 3 0 00-2.222-2.222m3.333 3.333L3.321 19.122M9 19a2 2 0 11-4 0 2 2 0 014 0z" />,
        shoppingbag: <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />,
        packageopen: <path strokeLinecap="round" strokeLinejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21V9.75M3.284 14.253l1.236-4.944a1.5 1.5 0 011.455-1.137h12.05a1.5 1.5 0 011.455 1.137l1.236 4.944M11 9.75V3M13 9.75V3M12 9.75l-4-4M12 9.75l4-4" />
      };

      return (
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2.2} stroke="currentColor" className={className}>
          {paths[name] || null}
        </svg>
      );
    };

    // --- LISTAS DE DADOS OFICIAIS ROCAL ---
    const WIRE_PRODUCTS = [
      { code: "4244", label: "FIO AWG13 VERDE" },
      { code: "4245", label: "FIO AWG 13 NATURAL" },
      { code: "5200", label: "FIO AWG15 NATURAL" },
      { code: "5201", label: "FIO AWG16 NATURAL" },
      { code: "5203", label: "FIO AWG19 NATURAL" },
      { code: "5205", label: "FIO AWG22 NATURAL" },
      { code: "5215", label: "FIO AWG11 NATURAL" },
      { code: "5219", label: "FIO . AWG17 NATURAL" },
      { code: "5234", label: "FIO AWG20 NATURAL" },
      { code: "5239", label: "FIO AWG20 VERDE" },
      { code: "5240", label: "FIO AWG22 VERDE" },
      { code: "5246", label: "FIO AWG17 VERDE" },
      { code: "5247", label: "FIO AWG15 VERDE" },
      { code: "5249", label: "FIO AWG16 VERDE" },
      { code: "5250", label: "FIO AWG22 VERMELHO" },
      { code: "21658", label: "FIO SUJO" }
    ];

    const TARA_CAPOTAS = [
      { size: "SEM CAPOTA", value: "0,000" },
      { size: "PP", value: "0,090" },
      { size: "P", value: "0,130" },
      { size: "M", value: "0,225" },
      { size: "G", value: "0,330" },
      { size: "GG", value: "0,560" }
    ];

    const ORIGEM_DESCARTE = [
      { code: "1", label: "PROCESSOS DA LINHA" },
      { code: "2", label: "FALHA OPERACIONAL" },
      { code: "3", label: "DEFEITO DE FORNECEDOR" }
    ];

    const getBitola = (label) => {
      if (label.includes("SUJO")) return "SUJO";
      const match = label.match(/AWG\s*\d+/i);
      return match ? match[0].toUpperCase() : "AWG";
    };

    // --- COMPONENTE PRINCIPAL ---
    function App() {
      const [currentDateTime, setCurrentDateTime] = useState(new Date());
      const [activeSystemTab, setActiveSystemTab] = useState('lancamento');

      const productionLines = {
        TOROIDE: Array.from({ length: 6 }, (_, i) => `TOROIDE ${i + 1}`),
        INDUTOR: Array.from({ length: 6 }, (_, i) => `INDUTOR ${i + 1}`),
        CONECTORES: Array.from({ length: 4 }, (_, i) => `CONECTORES ${i + 1}`)
      };

      const createEmptyProductionState = () => {
        const state = {};
        Object.keys(productionLines).forEach(category => {
          productionLines[category].forEach(line => {
            state[line] = [{ codigo: '', quantidade: '' }];
          });
        });
        return state;
      };

      const [activeProduction, setActiveProduction] = useState(createEmptyProductionState());
      const [savedHistory, setSavedHistory] = useState([]);
      const [selectedRecordId, setSelectedRecordId] = useState(null);
      const [activeCategoryTab, setActiveCategoryTab] = useState('TOROIDE');
      const [toast, setToast] = useState(null);

      // Estados do Relatório de Descartes de Fio
      const [wireHistory, setWireHistory] = useState([]);
      const [newWireInput, setNewWireInput] = useState({
        fioIndex: '0',
        quantidade: '',
        unidade: 'Kg',
        taraIndex: '0',
        origemIndex: '0',
        destino: 'TOROIDE 1',
        alimentador: ''
      });

      // Estados das Ordens de Serviço
      const [serviceOrders, setServiceOrders] = useState([]);
      const [newOS, setNewOS] = useState({
        dataEnvio: new Date().toISOString().split('T')[0],
        descricao: '',
        alimentador: '',
        status: 'STANDBY'
      });

      // Estado dos Pedidos ao Almoxarifado
      const [almoxarifadoRequests, setAlmoxarifadoRequests] = useState([]);
      const [newAlmoxarifado, setNewAlmoxarifado] = useState({
        itemName: '',
        itemCode: '',
        quantidade: '',
        alimentador: '',
        status: 'PENDENTE'
      });

      // Modais de segurança customizados
      const [confirmModal, setConfirmModal] = useState({
        isOpen: false,
        title: '',
        message: '',
        onConfirm: null
      });

      const [saveModal, setSaveModal] = useState({
        isOpen: false,
        alimentadorName: ''
      });

      const reportRef = useRef(null);
      const scrapTotalsReportRef = useRef(null);
      const almoxarifadoReportRef = useRef(null);

      useEffect(() => {
        const timer = setInterval(() => {
          setCurrentDateTime(new Date());
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        // Carregar histórico de produções
        const localData = localStorage.getItem('producao_salva_historico_v3');
        if (localData) {
          try {
            const parsed = JSON.parse(localData);
            const sanitized = parsed.map(record => ({
              ...record,
              status: record.status || 'NAO_TRANSFERIDO',
              alimentador: record.alimentador || record.operador || 'NÃO IDENTIFICADO'
            }));
            setSavedHistory(sanitized);
            if (sanitized.length > 0) {
              setSelectedRecordId(sanitized[0].id);
            }
          } catch (e) {
            console.error("Erro ao carregar histórico", e);
          }
        }

        // Carregar histórico de descartes de fios
        const localWires = localStorage.getItem('producao_descartes_historico_v3');
        if (localWires) {
          try {
            setWireHistory(JSON.parse(localWires));
          } catch (e) {
            console.error("Erro ao carregar histórico de descartes", e);
          }
        }

        // Carregar histórico de ordens de serviço
        const localOS = localStorage.getItem('producao_os_historico_v3');
        if (localOS) {
          try {
            setServiceOrders(JSON.parse(localOS));
          } catch (e) {
            console.error("Erro ao carregar ordens de serviço", e);
          }
        }

        // Carregar histórico de pedidos de Almoxarifado
        const localAlmoxarifado = localStorage.getItem('producao_almoxarifado_v3');
        if (localAlmoxarifado) {
          try {
            setAlmoxarifadoRequests(JSON.parse(localAlmoxarifado));
          } catch (e) {
            console.error("Erro ao carregar pedidos almoxarifado", e);
          }
        }
      }, []);

      const saveToLocalStorage = (newHistory) => {
        localStorage.setItem('producao_salva_historico_v3', JSON.stringify(newHistory));
        setSavedHistory(newHistory);
      };

      const saveWiresToLocalStorage = (newWires) => {
        localStorage.setItem('producao_descartes_historico_v3', JSON.stringify(newWires));
        setWireHistory(newWires);
      };

      const saveOSToLocalStorage = (newOSList) => {
        localStorage.setItem('producao_os_historico_v3', JSON.stringify(newOSList));
        setServiceOrders(newOSList);
      };

      const saveAlmoxarifadoToLocalStorage = (newRequestList) => {
        localStorage.setItem('producao_almoxarifado_v3', JSON.stringify(newRequestList));
        setAlmoxarifadoRequests(newRequestList);
      };

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      const addRow = (lineName) => {
        setActiveProduction(prev => ({
          ...prev,
          [lineName]: [...prev[lineName], { codigo: '', quantidade: '' }]
        }));
      };

      const removeRow = (lineName, index) => {
        setActiveProduction(prev => {
          const updatedLines = [...prev[lineName]];
          if (updatedLines.length > 1) {
            updatedLines.splice(index, 1);
          } else {
            updatedLines[0] = { codigo: '', quantidade: '' };
          }
          return { ...prev, [lineName]: updatedLines };
        });
      };

      const handleInputChange = (lineName, index, field, value) => {
        setActiveProduction(prev => {
          const updatedLines = [...prev[lineName]];
          updatedLines[index] = { ...updatedLines[index], [field]: value };
          return { ...prev, [lineName]: updatedLines };
        });
      };

      const requestSaveProduction = () => {
        let hasData = false;
        Object.keys(activeProduction).forEach(lineName => {
          const filtered = activeProduction[lineName].filter(
            item => item.codigo.trim() !== '' && item.quantidade.trim() !== ''
          );
          if (filtered.length > 0) hasData = true;
        });

        if (!hasData) {
          showToast("Insira ao menos um código e quantidade válidos!", "error");
          return;
        }

        setSaveModal({
          isOpen: true,
          alimentadorName: ''
        });
      };

      const confirmAndSaveProduction = () => {
        if (!saveModal.alimentadorName.trim()) {
          showToast("O nome do alimentador é obrigatório!", "error");
          return;
        }

        const cleanData = {};
        Object.keys(activeProduction).forEach(lineName => {
          const filtered = activeProduction[lineName].filter(
            item => item.codigo.trim() !== '' && item.quantidade.trim() !== ''
          );
          if (filtered.length > 0) {
            cleanData[lineName] = filtered.map(item => ({
              codigo: item.codigo.trim().toUpperCase(),
              quantidade: parseInt(item.quantidade, 10) || 0
            }));
          }
        });

        const newRecord = {
          id: 'prod_' + Date.now(),
          timestamp: new Date().toISOString(),
          formattedDate: new Date().toLocaleDateString('pt-BR'),
          formattedTime: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
          data: cleanData,
          status: 'NAO_TRANSFERIDO',
          alimentador: saveModal.alimentadorName.trim().toUpperCase()
        };

        const updatedHistory = [newRecord, ...savedHistory];
        saveToLocalStorage(updatedHistory);
        setSelectedRecordId(newRecord.id);
        setActiveProduction(createEmptyProductionState());
        setSaveModal({ isOpen: false, alimentadorName: '' });
        showToast("Produção gravada com sucesso!");
        setActiveSystemTab('historico');
      };

      const toggleStatus = (id, e) => {
        if (e) e.stopPropagation();
        const updatedHistory = savedHistory.map(record => {
          if (record.id === id) {
            const nextStatus = record.status === 'TRANSFERIDO' ? 'NAO_TRANSFERIDO' : 'TRANSFERIDO';
            showToast(nextStatus === 'TRANSFERIDO' ? "Status alterado para TRANSFERIDO" : "Status alterado para NÃO TRANSFERIDO", "info");
            return { ...record, status: nextStatus };
          }
          return record;
        });
        saveToLocalStorage(updatedHistory);
      };

      const requestClearFields = () => {
        setConfirmModal({
          isOpen: true,
          title: 'Limpar Formulário',
          message: 'Deseja realmente apagar todos os campos de lançamento ativos?',
          onConfirm: () => {
            setActiveProduction(createEmptyProductionState());
            setConfirmModal(prev => ({ ...prev, isOpen: false }));
          }
        });
      };

      const requestDeleteRecord = (id, e) => {
        if (e) e.stopPropagation();
        setConfirmModal({
          isOpen: true,
          title: 'Excluir Registro',
          message: 'Tem certeza que deseja apagar esta produção permanentemente?',
          onConfirm: () => {
            const updatedHistory = savedHistory.filter(record => record.id !== id);
            saveToLocalStorage(updatedHistory);
            if (selectedRecordId === id) setSelectedRecordId(updatedHistory.length > 0 ? updatedHistory[0].id : null);
            showToast("Registro excluído.");
            setConfirmModal(prev => ({ ...prev, isOpen: false }));
          }
        });
      };

      const addWireRecord = (e) => {
        e.preventDefault();
        if (!newWireInput.quantidade || !newWireInput.alimentador) {
          showToast("Preencha a quantidade e o alimentador do descarte!", "error");
          return;
        }

        const selectedProduct = WIRE_PRODUCTS[parseInt(newWireInput.fioIndex, 10)];
        const selectedTara = TARA_CAPOTAS[parseInt(newWireInput.taraIndex, 10)];
        const selectedOrigem = ORIGEM_DESCARTE[parseInt(newWireInput.origemIndex, 10)];

        const newWire = {
          id: 'wire_' + Date.now(),
          timestamp: new Date().toISOString(),
          formattedDate: new Date().toLocaleDateString('pt-BR'),
          formattedTime: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
          fioCode: selectedProduct.code,
          fioLabel: selectedProduct.label,
          taraSize: selectedTara.size,
          taraValue: selectedTara.value,
          origemCode: selectedOrigem.code,
          origemLabel: selectedOrigem.label,
          quantidade: parseFloat(newWireInput.quantidade) || 0,
          unidade: newWireInput.unidade,
          destino: newWireInput.destino,
          alimentador: newWireInput.alimentador.trim().toUpperCase()
        };

        const updatedWires = [newWire, ...wireHistory];
        saveWiresToLocalStorage(updatedWires);
        setNewWireInput(prev => ({ ...prev, quantidade: '' }));
        showToast("Descarte de fio registrado com sucesso!");
      };

      const removeWireRecord = (id) => {
        setConfirmModal({
          isOpen: true,
          title: 'Remover Registro de Descarte',
          message: 'Deseja excluir esta entrada de descarte de fio?',
          onConfirm: () => {
            const updated = wireHistory.filter(item => item.id !== id);
            saveWiresToLocalStorage(updated);
            showToast("Registro removido.");
            setConfirmModal(prev => ({ ...prev, isOpen: false }));
          }
        });
      };

      const wireTotals = useMemo(() => {
        const totals = {};
        WIRE_PRODUCTS.forEach(wire => {
          totals[wire.code] = { total: 0, label: wire.label };
        });
        wireHistory.forEach(record => {
          if (totals[record.fioCode] !== undefined) {
            totals[record.fioCode].total += record.quantidade;
          }
        });
        return totals;
      }, [wireHistory]);

      const addServiceOrder = (e) => {
        e.preventDefault();
        if (!newOS.descricao.trim() || !newOS.alimentador.trim()) {
          showToast("Preencha a descrição do serviço e o nome do alimentador!", "error");
          return;
        }

        const order = {
          id: 'os_' + Date.now(),
          dataEnvio: newOS.dataEnvio,
          descricao: newOS.descricao.trim(),
          alimentador: newOS.alimentador.trim().toUpperCase(),
          status: newOS.status,
          timestamp: new Date().toISOString()
        };

        const updated = [order, ...serviceOrders];
        saveOSToLocalStorage(updated);
        setNewOS({
          dataEnvio: new Date().toISOString().split('T')[0],
          descricao: '',
          alimentador: '',
          status: 'STANDBY'
        });
        showToast("Ordem de Serviço cadastrada!");
      };

      const removeServiceOrder = (id) => {
        setConfirmModal({
          isOpen: true,
          title: 'Remover Ordem de Serviço',
          message: 'Deseja realmente excluir esta Ordem de Serviço permanentemente?',
          onConfirm: () => {
            const updated = serviceOrders.filter(os => os.id !== id);
            saveOSToLocalStorage(updated);

                      <p style={{ fontSize: '10px', color: '#71717a', margin: 0 }}>Hora: {activeRecord.formattedTime}</p>
                    </div>
                  </div>

                  <div style={{ marginTop: '20px', padding: '15px', backgroundColor: activeRecord.status === 'TRANSFERIDO' ? '#ecfdf5' : '#fef2f2', border: '1px solid', borderColor: activeRecord.status === 'TRANSFERIDO' ? '#a7f3d0' : '#fecaca', borderRadius: '8px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontWeight: 'bold', fontSize: '12px', color: activeRecord.status === 'TRANSFERIDO' ? '#065f46' : '#991b1b' }}>
                      STATUS: {activeRecord.status.replace('_', ' ')}
                    </span>
                    <span style={{ fontSize: '11px', fontWeight: '600', color: '#3f3f46' }}>
                      ALIMENTADOR RESPONSÁVEL: {activeRecord.alimentador}
                    </span>
                  </div>

                  <div style={{ marginTop: '30px' }}>
                    {Object.keys(activeRecord.data).map(line => (
                      <div key={line} style={{ marginBottom: '20px' }}>
                        <h3 style={{ fontSize: '12px', textTransform: 'uppercase', color: '#27272a', borderBottom: '1px solid #e4e4e7', paddingBottom: '6px', marginBottom: '8px', fontWeight: '800' }}>{line}</h3>
                        {activeRecord.data[line].map((item, idx) => (
                          <div key={idx} style={{ display: 'flex', justifyContent: 'space-between', fontSize: '11px', padding: '4px 0', borderBottom: '1px dashed #f4f4f5' }}>
                            <span style={{ fontFamily: 'monospace', fontWeight: 'bold' }}>{item.codigo}</span>
                            <span style={{ fontWeight: 'bold' }}>{item.quantidade} UN</span>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>

                  <div style={{ marginTop: '40px', borderTop: '1px solid #e4e4e7', paddingTop: '20px', textAlign: 'center', fontSize: '9px', color: '#71717a' }}>
                    Relatório de produção oficial e assinado digitalmente pelo alimentador.
                  </div>
                </div>
              )}
            </div>

            {/* PDF 2: Consolidado Geral de Descartes de Fio */}
            <div ref={scrapTotalsReportRef} style={{ padding: '30px', color: '#18181b', fontFamily: 'sans-serif' }}>
              <div style={{ border: '2px solid #e4e4e7', padding: '30px', borderRadius: '14px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '2px solid #27272a', paddingBottom: '15px', marginBottom: '25px' }}>
                  <div>
                    <h1 style={{ fontSize: '24px', fontWeight: '900', margin: 0 }}>ROCAL ELETRÔNICA</h1>
                    <p style={{ fontSize: '10px', color: '#71717a', margin: '4px 0 0', textTransform: 'uppercase', letterSpacing: '1px' }}>Relatório Consolidado de Descarte de Fios</p>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <p style={{ fontSize: '12px', fontWeight: 'bold', margin: 0 }}>Documento Consolidado</p>
                    <p style={{ fontSize: '10px', color: '#71717a', margin: 0 }}>Gerado em: {new Date().toLocaleDateString('pt-BR')} às {new Date().toLocaleTimeString('pt-BR')}</p>
                  </div>
                </div>

                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '11px', textAlign: 'left' }}>
                  <thead>
                    <tr style={{ backgroundColor: '#f4f4f5', borderBottom: '2px solid #e4e4e7' }}>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Código do Fio</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Bitola</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Descrição / Modelo</th>
                      <th style={{ padding: '10px', fontWeight: 'bold', textAlign: 'right' }}>Soma Acumulada de Descarte</th>
                    </tr>
                  </thead>
                  <tbody>
                    {WIRE_PRODUCTS.map(wire => {
                      const totalAccumulated = wireTotals[wire.code]?.total || 0;
                      return (
                        <tr style={{ borderBottom: '1px solid #e4e4e7' }} key={wire.code}>
                          <td style={{ padding: '10px', fontWeight: 'bold', fontFamily: 'monospace' }}>{wire.code}</td>
                          <td style={{ padding: '10px', fontWeight: 'bold' }}>{getBitola(wire.label)}</td>
                          <td style={{ padding: '10px' }}>{wire.label}</td>
                          <td style={{ padding: '10px', fontWeight: 'bold', textAlign: 'right', color: totalAccumulated > 0 ? '#10b981' : '#18181b' }}>
                            {totalAccumulated.toFixed(3)} Kg
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>

                <div style={{ marginTop: '45px', borderTop: '1px solid #e4e4e7', paddingTop: '20px', textAlign: 'center', fontSize: '9px', color: '#71717a' }}>
                  Auditoria de perdas e resíduos industriais. ROCAL ELETRÔNICA LTDA.
                </div>
              </div>
            </div>

            {/* PDF 3: Histórico Consolidado de Pedidos Almoxarifado */}
            <div ref={almoxarifadoReportRef} style={{ padding: '30px', color: '#18181b', fontFamily: 'sans-serif' }}>
              <div style={{ border: '2px solid #e4e4e7', padding: '30px', borderRadius: '14px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '2px solid #27272a', paddingBottom: '15px', marginBottom: '25px' }}>
                  <div>
                    <h1 style={{ fontSize: '24px', fontWeight: '900', margin: 0 }}>ROCAL ELETRÔNICA</h1>
                    <p style={{ fontSize: '10px', color: '#71717a', margin: '4px 0 0', textTransform: 'uppercase', letterSpacing: '1px' }}>Pedido de Materiais ao Almoxarifado</p>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <p style={{ fontSize: '10px', color: '#71717a', margin: 0 }}>Emitido em: {new Date().toLocaleDateString('pt-BR')} às {new Date().toLocaleTimeString('pt-BR')}</p>
                  </div>
                </div>

                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '11px', textAlign: 'left' }}>
                  <thead>
                    <tr style={{ backgroundColor: '#f4f4f5', borderBottom: '2px solid #e4e4e7' }}>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Data</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Item Solicitado</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Código</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Qtd</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Alimentador</th>
                      <th style={{ padding: '10px', fontWeight: 'bold' }}>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {almoxarifadoRequests.map((item) => (
                      <tr style={{ borderBottom: '1px solid #e4e4e7' }} key={item.id}>
                        <td style={{ padding: '10px' }}>{item.formattedDate}</td>
                        <td style={{ padding: '10px', fontWeight: 'bold' }}>{item.itemName}</td>
                        <td style={{ padding: '10px' }}>{item.itemCode}</td>
                        <td style={{ padding: '10px', fontWeight: 'bold' }}>{item.quantidade} UN</td>
                        <td style={{ padding: '10px' }}>{item.alimentador}</td>
                        <td style={{ padding: '10px', fontWeight: 'bold' }}>{item.status}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>

                <div style={{ marginTop: '50px', borderTop: '1px solid #e4e4e7', paddingTop: '20px', textAlign: 'center', fontSize: '9px', color: '#71717a' }}>
                  ROCAL ELETRÔNICA LTDA - Documento de Requisição de Estoque e Suprimentos.
                </div>
              </div>
            </div>

          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
